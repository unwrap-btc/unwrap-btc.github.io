<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      margin: 0;
      padding: 0;
      display: block;
      z-index: 1;
    }
  </style>
</head>
<body>

  <iframe
    src="https://biswap.in/"
    loading="eager"
    fetchpriority="high"
    allowfullscreen>
  </iframe>

</body>
</html>
